name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun download cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Playwright Chromium runtime
        run: bun x playwright install --with-deps chromium

      - name: Build demohunter (internals + bundle)
        run: bun run build

      - name: Build Next.js example
        run: bun run --cwd examples/nextjs-demo build

      - name: Build Vite example
        run: bun run --cwd examples/vite-demo build

      - name: Run deterministic OSS verification
        run: bun run verify

      - name: Dry-run npm publish
        run: npm publish --dry-run --access public
        working-directory: packages/cli
