name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (semver, no leading 'v'). Example: 0.1.0"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version input
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '${{ inputs.version }}' is not valid semver."
            exit 1
          fi

      - name: Fail if tag already exists
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists."
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Playwright Chromium runtime
        run: bun x playwright install --with-deps chromium

      - name: Run verify
        run: bun run verify

      - name: Bump package version
        run: npm version "${{ inputs.version }}" --no-git-tag-version
        working-directory: packages/cli

      - name: Dry-run publish
        run: npm publish --dry-run --access public
        working-directory: packages/cli

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json
          git commit -m "chore(release): v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          generate_release_notes: true
